<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#093023">
<title>Good Dog HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --g: #093023; --gm: #0d4a32; --y: #ffcc00;
  --white: #ffffff; --bg: #f8f8f6;
  --text: #1a1a1a; --mu: #888;
  --bd: rgba(9,48,35,0.1); --dv: #efefeb;
  --ibg: #fafaf8; --red: #e24b4a;
  --shadow: 0 2px 12px rgba(9,48,35,0.08);
  --shadow-hover: 0 6px 24px rgba(9,48,35,0.14);
  --radius: 12px;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow-x: hidden; }
body { font-family: 'Manrope', sans-serif; background: var(--white); color: var(--text); -webkit-font-smoothing: antialiased; }

/* ── HEADER ── */
header {
  background: var(--g); padding: 0 20px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; cursor: pointer; }
.logo-bars { display: flex; gap: 3px; align-items: flex-end; }
.logo-bars span { display: block; width: 4px; background: var(--y); border-radius: 2px; }
.logo-bars span:nth-child(1) { height: 12px; }
.logo-bars span:nth-child(2) { height: 18px; }
.logo-bars span:nth-child(3) { height: 22px; }
.logo-bars span:nth-child(4) { height: 18px; }
.logo-bars span:nth-child(5) { height: 12px; }
.logo-text { color: var(--white); font-size: 14px; font-weight: 800; letter-spacing: 0.05em; }
.logo-text span { color: var(--y); }
.header-right { display: flex; align-items: center; gap: 10px; }
.btn-login {
  background: transparent; border: 1.5px solid rgba(255,255,255,0.3);
  color: var(--white); padding: 6px 14px; border-radius: 8px;
  font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-login:hover { border-color: var(--y); color: var(--y); }
.btn-logout {
  background: transparent; border: 1.5px solid rgba(255,204,0,0.4);
  color: var(--y); padding: 6px 14px; border-radius: 8px;
  font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer;
}
.editor-badge {
  background: var(--y); color: var(--g); padding: 3px 9px;
  border-radius: 6px; font-size: 11px; font-weight: 800; letter-spacing: 0.04em;
}
.btn-settings {
  background: transparent; border: none; color: rgba(255,255,255,0.6);
  font-size: 18px; cursor: pointer; padding: 4px 6px; line-height: 1;
}
.btn-settings:hover { color: var(--y); }

/* ── MAIN ── */
main { max-width: 860px; margin: 0 auto; padding: 36px 20px 80px; }

/* ── HOME ── */
.home-greeting { margin-bottom: 32px; }
.home-greeting h1 { font-size: 24px; font-weight: 800; color: var(--g); margin-bottom: 4px; }
.home-greeting p { color: var(--mu); font-size: 14px; }
.sections-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.section-card {
  background: var(--white); border: 1.5px solid var(--bd); border-radius: var(--radius);
  padding: 24px 20px; cursor: pointer; transition: all 0.2s; text-align: left;
  width: 100%; box-shadow: var(--shadow);
}
.section-card:hover { border-color: var(--g); box-shadow: var(--shadow-hover); transform: translateY(-2px); }
.section-icon {
  width: 42px; height: 42px; background: var(--y); border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 14px;
}
.section-card h2 { font-size: 15px; font-weight: 700; color: var(--g); margin-bottom: 5px; }
.section-card p { font-size: 12px; color: var(--mu); line-height: 1.5; }

/* ── SECTION HEADER ── */
.section-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;
}
.section-header-left { display: flex; align-items: center; gap: 12px; }
.btn-back {
  background: none; border: 1.5px solid var(--bd); color: var(--text);
  padding: 7px 13px; border-radius: 8px; font-family: 'Manrope', sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-back:hover { border-color: var(--g); color: var(--g); }
.section-title { font-size: 20px; font-weight: 800; color: var(--g); }
.btn-add {
  background: var(--g); color: var(--white); border: none;
  padding: 9px 16px; border-radius: 8px; font-family: 'Manrope', sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s;
}
.btn-add:hover { background: var(--gm); }

/* ── CARDS LIST ── */
.cards-list { display: flex; flex-direction: column; gap: 8px; }
.item-card {
  background: var(--white); border: 1.5px solid var(--bd); border-radius: var(--radius);
  padding: 14px 18px; display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; transition: all 0.2s; box-shadow: 0 1px 4px rgba(9,48,35,0.05);
}
.item-card:hover { border-color: var(--g); box-shadow: var(--shadow); }
.item-card-left { display: flex; align-items: center; gap: 10px; }
.item-dot { width: 7px; height: 7px; background: var(--y); border-radius: 50%; flex-shrink: 0; }
.item-name { font-size: 14px; font-weight: 600; color: var(--text); }
.item-card-right { display: flex; align-items: center; gap: 6px; }
.btn-icon {
  background: none; border: none; cursor: pointer; padding: 5px;
  border-radius: 6px; font-size: 14px; transition: background 0.15s; line-height: 1;
}
.btn-icon:hover { background: var(--bg); }
.btn-icon.danger:hover { background: #fee2e2; }
.arrow { color: var(--mu); font-size: 18px; }

/* ── CARD DETAIL ── */
.card-detail { max-width: 700px; }
.card-detail-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;
  flex-wrap: wrap; gap: 12px;
}
.card-detail-title { font-size: 22px; font-weight: 800; color: var(--g); }
.card-actions { display: flex; gap: 8px; }
.btn-edit {
  background: none; border: 1.5px solid var(--bd); color: var(--text);
  padding: 7px 13px; border-radius: 8px; font-family: 'Manrope', sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-edit:hover { border-color: var(--g); color: var(--g); }
.btn-delete {
  background: none; border: 1.5px solid #fca5a5; color: #dc2626;
  padding: 7px 13px; border-radius: 8px; font-family: 'Manrope', sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-delete:hover { background: #fee2e2; }
.card-content {
  background: var(--white); border: 1.5px solid var(--bd); border-radius: var(--radius);
  padding: 24px; line-height: 1.7; font-size: 14px; box-shadow: var(--shadow);
}
.card-content h3 { font-size: 14px; font-weight: 700; color: var(--g); margin: 18px 0 7px; }
.card-content h3:first-child { margin-top: 0; }
.card-content p { margin-bottom: 7px; color: var(--text); }
.card-content ul, .card-content ol { padding-left: 18px; margin-bottom: 7px; }
.card-content li { margin-bottom: 3px; }
.card-content table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
.card-content th { background: var(--g); color: var(--white); padding: 7px 11px; text-align: left; font-weight: 600; font-size: 12px; }
.card-content td { padding: 7px 11px; border-bottom: 1px solid var(--bd); }
.card-content tr:last-child td { border-bottom: none; }
.card-content tr:nth-child(even) td { background: var(--ibg); }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 56px 24px; color: var(--mu); }
.empty-state .empty-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.35; }
.empty-state p { font-size: 14px; }

/* ── SHIFT (from original app) ── */
.shift-wrap { max-width: 500px; margin: 0 auto; }
.app-body { display: flex; flex-direction: column; gap: 12px; padding-bottom: 16px; }
.card {
  background: var(--white); border: 1.5px solid var(--bd);
  border-radius: 16px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(9,48,35,0.05);
}
.card-title {
  font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  color: var(--g); margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
}
.group-label {
  font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
  color: var(--mu); padding: 10px 0 6px;
}
.dt-row { display: flex; gap: 8px; }
.dt-inp {
  flex: 1; font-size: 14px; font-family: 'Manrope', sans-serif;
  border: 0.5px solid var(--bd); border-radius: 10px; padding: 9px 12px;
  background: var(--ibg); color: var(--text); outline: none;
}
.dt-inp:focus { border-color: var(--g); }
.name-field { display: flex; align-items: center; gap: 6px; padding: 8px 0; }
.nf-label { font-size: 12px; color: var(--mu); width: 60px; flex-shrink: 0; }
.nf-inp {
  flex: 1; font-size: 14px; font-family: 'Manrope', sans-serif;
  border: none; border-bottom: 1px solid var(--bd); background: transparent;
  color: var(--text); outline: none; padding: 2px 0;
}
.nf-inp:focus { border-color: var(--g); }
.item-row {
  display: flex; align-items: center; gap: 5px; padding: 6px 0;
  border-bottom: 0.5px solid var(--dv);
}
.item-row:last-of-type { border-bottom: none; }
.sitem-name {
  font-size: 13px; font-weight: 500; color: var(--text); flex: 1;
  min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.item-name-input {
  flex: 1; font-size: 13px; font-family: 'Manrope', sans-serif; font-weight: 500;
  border: none; border-bottom: 1.5px solid var(--g); background: transparent;
  color: var(--g); outline: none; padding: 0; min-width: 0;
}
.num-inp {
  width: 48px; font-size: 13px; font-family: 'Manrope', sans-serif;
  border: 0.5px solid var(--bd); border-radius: 8px; padding: 5px 6px;
  text-align: right; background: var(--ibg); color: var(--text); outline: none;
  -moz-appearance: textfield;
}
.num-inp::-webkit-outer-spin-button, .num-inp::-webkit-inner-spin-button { -webkit-appearance: none; }
.num-inp:focus { border-color: var(--g); }
.unit-sel {
  font-size: 11px; color: var(--g); background: rgba(9,48,35,0.06);
  border: none; border-radius: 6px; padding: 3px 4px; outline: none; cursor: pointer;
  font-family: 'Manrope', sans-serif;
}
.edit-btn { background: none; border: none; cursor: pointer; color: #ccc; font-size: 14px; padding: 2px 3px; line-height: 1; flex-shrink: 0; }
.del-btn { background: none; border: none; cursor: pointer; color: #ddd; font-size: 18px; line-height: 1; padding: 0 2px; flex-shrink: 0; }
.s-add-btn {
  width: 100%; margin-top: 10px; padding: 8px; font-size: 13px;
  font-family: 'Manrope', sans-serif; font-weight: 500; color: var(--g);
  background: rgba(9,48,35,0.05); border: 1px dashed rgba(9,48,35,0.2);
  border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
}
.s-add-btn:active { background: rgba(9,48,35,0.1); }
.writeoff-inp {
  width: 100%; font-size: 13px; font-family: 'Manrope', sans-serif;
  border: 0.5px solid var(--bd); border-radius: 10px; padding: 9px 12px;
  background: var(--ibg); color: var(--text); outline: none; margin-bottom: 7px; display: block;
}
.writeoff-inp:last-of-type { margin-bottom: 0; }
.writeoff-inp:focus { border-color: var(--g); }
.send-btn {
  width: 100%; padding: 15px; background: var(--g); color: var(--y);
  border: none; border-radius: 14px; font-size: 15px; font-weight: 700;
  font-family: 'Manrope', sans-serif; display: flex; align-items: center;
  justify-content: center; gap: 10px; cursor: pointer; margin-top: 4px;
}
.send-btn:active { transform: scale(0.98); }
.send-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
.shift-tabs {
  display: flex; gap: 0; margin-bottom: 20px;
  border: 1.5px solid var(--bd); border-radius: 10px; overflow: hidden;
}
.shift-tab {
  flex: 1; padding: 10px; background: var(--white); border: none;
  font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 600;
  color: var(--mu); cursor: pointer; transition: all 0.2s;
}
.shift-tab.active { background: var(--g); color: var(--white); }
.shift-form { display: none; }
.shift-form.active { display: block; }
.hint { font-size: 11px; color: var(--mu); text-align: center; margin-top: 6px; }
.btn-shift-products {
  background: var(--g); color: var(--white); border: none; padding: 8px 12px;
  border-radius: 8px; font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: background 0.2s;
}
.btn-shift-products:hover { background: var(--gm); }
.product-manager-tabs {
  display: flex; gap: 8px; margin-bottom: 16px;
}
.product-manager-tab {
  flex: 1; border: 1.5px solid var(--bd); background: var(--white); color: var(--text);
  border-radius: 10px; padding: 9px 10px; font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer;
}
.product-manager-tab.active { background: var(--g); color: var(--white); border-color: var(--g); }
.product-group-card {
  background: var(--ibg); border: 1px solid var(--bd); border-radius: 12px; padding: 12px;
  margin-bottom: 12px;
}
.product-group-header {
  display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px;
}
.product-group-name {
  flex: 1; padding: 8px 10px; border: 1px solid var(--bd); border-radius: 8px; font-size: 13px;
  font-family: 'Manrope', sans-serif; background: var(--white); color: var(--text);
}
.product-item-row {
  display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
}
.product-item-name {
  flex: 1; padding: 7px 9px; border: 1px solid var(--bd); border-radius: 8px; font-size: 13px;
  font-family: 'Manrope', sans-serif; background: var(--white); color: var(--text);
}
.product-item-unit {
  min-width: 76px; padding: 7px 8px; border: 1px solid var(--bd); border-radius: 8px;
  font-size: 12px; font-family: 'Manrope', sans-serif; background: var(--white); color: var(--text);
}
.product-item-delete, .product-group-delete {
  border: none; background: transparent; color: #b45309; cursor: pointer; font-size: 13px;
  font-family: 'Manrope', sans-serif; font-weight: 700; padding: 4px 6px; border-radius: 6px;
}
.product-item-delete:hover, .product-group-delete:hover { background: rgba(180,83,9,0.08); }
.product-manager-actions { margin-top: 10px; }
.empty-state.compact { padding: 18px 10px; font-size: 12px; }

/* ── MODALS ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(9,48,35,0.4);
  z-index: 200; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--white); border-radius: 16px; padding: 28px;
  width: 100%; max-width: 460px; box-shadow: 0 20px 60px rgba(9,48,35,0.2);
  max-height: 90vh; overflow-y: auto;
}
.modal.wide { max-width: 660px; }
.modal h2 { font-size: 17px; font-weight: 800; color: var(--g); margin-bottom: 18px; }
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block; font-size: 11px; font-weight: 700; color: var(--mu);
  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px;
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 9px 13px; border: 1.5px solid var(--bd); border-radius: 8px;
  font-family: 'Manrope', sans-serif; font-size: 14px; color: var(--text);
  outline: none; transition: border-color 0.2s; background: var(--white);
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--g); }
.form-group textarea { min-height: 200px; resize: vertical; line-height: 1.6; }
.form-hint { font-size: 11px; color: var(--mu); margin-top: 4px; line-height: 1.4; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.btn-cancel {
  background: none; border: 1.5px solid var(--bd); color: var(--text);
  padding: 9px 16px; border-radius: 8px; font-family: 'Manrope', sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer;
}ы
.btn-save {
  background: var(--g); color: var(--white); border: none;
  padding: 9px 18px; border-radius: 8px; font-family: 'Manrope', sans-serif;
  font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.2s;
}
.btn-save:hover { background: var(--gm); }
.settings-section { background: var(--ibg); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
.settings-section h3 { font-size: 11px; font-weight: 700; color: var(--mu); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }

/* ── GITHUB SAVE BAR ── */
.save-github-bar { display: none; position: fixed; bottom: 20px; right: 20px; z-index: 90; }
.save-github-bar.visible { display: block; }
.btn-github-save {
  background: var(--g); color: var(--white); border: none; padding: 11px 20px;
  border-radius: 10px; font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 16px rgba(9,48,35,0.3); transition: all 0.2s;
  display: flex; align-items: center; gap: 7px;
}
.btn-github-save:hover { background: var(--gm); transform: translateY(-1px); }
.btn-github-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--g); color: var(--white); padding: 11px 18px; border-radius: 10px;
  font-size: 13px; font-weight: 600; z-index: 300; transition: transform 0.3s; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: #dc2626; }

@media (max-width: 600px) {
  main { padding: 20px 14px 80px; }
  .sections-grid { grid-template-columns: 1fr; }
  .modal { padding: 20px 16px; }
}
</style>
</head>
<body>

<svg style="display:none">
  <symbol id="logo" viewBox="0 0 280 170">
    <rect x="10" y="5" width="32" height="88" rx="4" fill="#ffcc00"/>
    <rect x="56" y="5" width="32" height="88" rx="4" fill="#ffcc00"/>
    <rect x="102" y="5" width="32" height="88" rx="4" fill="#ffcc00"/>
    <rect x="148" y="5" width="32" height="88" rx="4" fill="#ffcc00"/>
    <rect x="194" y="5" width="32" height="88" rx="4" fill="#ffcc00"/>
    <text x="118" y="148" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="40" fill="#ffffff" letter-spacing="1">GOOD DOG</text>
  </symbol>
</svg>

<header>
  <div class="logo" onclick="goHome()">
    <div class="logo-bars"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="logo-text">GOOD DOG <span>HQ</span></div>
  </div>
  <div class="header-right" id="headerRight">
    <button class="btn-login" onclick="openLoginModal()">Войти</button>
  </div>
</header>

<main id="mainContent"></main>

<div class="save-github-bar" id="saveBar">
  <button class="btn-github-save" id="btnGithubSave" onclick="saveToGithub()">☁️ Сохранить в GitHub</button>
</div>

<div class="toast" id="toast"></div>

<!-- Login -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <h2>Вход для редактора</h2>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" id="loginPassword" placeholder="Введи пароль" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('loginModal')">Отмена</button>
      <button class="btn-save" onclick="doLogin()">Войти</button>
    </div>
  </div>
</div>

<!-- Settings -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>⚙️ Настройки</h2>
    <div class="settings-section">
      <h3>GitHub</h3>
      <div class="form-group">
        <label>Personal Access Token</label>
        <input type="password" id="githubToken" placeholder="ghp_...">
        <p class="form-hint">Хранится только в браузере. Нужен для сохранения данных.</p>
      </div>
      <div class="form-group">
        <label>Репозиторий</label>
        <input type="text" id="githubRepo" placeholder="qamarjora/gooddog-hq">
      </div>
    </div>
    <div class="settings-section">
      <h3>Безопасность</h3>
      <div class="form-group">
        <label>Новый пароль редактора</label>
        <input type="password" id="editorPassword" placeholder="Оставь пустым чтобы не менять">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('settingsModal')">Отмена</button>
      <button class="btn-save" onclick="saveSettings()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Card Modal -->
<div class="modal-overlay" id="cardModal">

// ── MARKDOWN PARSER ──
function parseContent(text) {
  if (!text) return '<p>Пусто</p>';
  const lines = text.split('\n');
  let html = '', inTable = false, inList = false, tableRows = [];
  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];
    if (line.trim().startsWith('|')) {
      if (!inTable) { inTable = true; tableRows = []; }
      tableRows.push(line.trim()); continue;
    } else if (inTable) { html += renderTable(tableRows); inTable = false; tableRows = []; }
    if (line.startsWith('## ')) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h3>${esc(line.slice(3))}</h3>`; continue;
    }
    if (line.startsWith('- ')) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${inlineFmt(line.slice(2))}</li>`; continue;
    } else if (inList) { html += '</ul>'; inList = false; }
    if (/^\d+\.\s/.test(line)) { html += `<li>${inlineFmt(line.replace(/^\d+\.\s/, ''))}</li>`; continue; }
    if (line.trim() === '') continue;
    html += `<p>${inlineFmt(line)}</p>`;
  }
  if (inTable) html += renderTable(tableRows);
  if (inList) html += '</ul>';
  return html;
}
function renderTable(rows) {
  const filtered = rows.filter(r => !r.match(/^\|[-|\s]+\|$/));
  if (!filtered.length) return '';
  let html = '<table>';
  filtered.forEach((row, i) => {
    const cells = row.split('|').filter((_, idx, arr) => idx > 0 && idx < arr.length - 1);
    const t = i === 0 ? 'th' : 'td';
    html += '<tr>' + cells.map(c => `<${t}>${esc(c.trim())}</${t}>`).join('') + '</tr>';
  });
  return html + '</table>';
}
function inlineFmt(t) { return esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>'); }
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getShiftProducts() {
  if (!shiftProductsCache) {
    try {
      const raw = localStorage.getItem(SHIFT_PRODUCTS_KEY);
      if (raw) {
        shiftProductsCache = normalizeShiftProducts(JSON.parse(raw));
      } else {
        shiftProductsCache = normalizeShiftProducts(DEFAULT_SHIFT_PRODUCTS);
        localStorage.setItem(SHIFT_PRODUCTS_KEY, JSON.stringify(shiftProductsCache));
      }
    } catch {
      shiftProductsCache = normalizeShiftProducts(DEFAULT_SHIFT_PRODUCTS);
      localStorage.setItem(SHIFT_PRODUCTS_KEY, JSON.stringify(shiftProductsCache));
    }
  }
  return clone(shiftProductsCache);
}
function setShiftProducts(data) {
  shiftProductsCache = normalizeShiftProducts(data);
  localStorage.setItem(SHIFT_PRODUCTS_KEY, JSON.stringify(shiftProductsCache));
}
function normalizeShiftProducts(data) {
  const src = data && typeof data === 'object' ? data : {};
  const fallback = clone(DEFAULT_SHIFT_PRODUCTS);
  const normalizeRole = (role) => {
    const groups = Array.isArray(src[role]) ? src[role] : fallback[role];
    return groups.map((group, index) => ({
      id: group && group.id ? group.id : `${role}_${index + 1}`,
      name: group && group.name ? group.name : `Группа ${index + 1}`,
      section: group && group.section ? group.section : 'stock',
      items: Array.isArray(group && group.items) ? group.items.map((item, itemIndex) => ({
        id: item && item.id ? item.id : `${role}_${index + 1}_${itemIndex + 1}`,
        name: item && item.name ? item.name : `Позиция ${itemIndex + 1}`,
        unit: item && item.unit ? item.unit : 'шт'
      })) : []
    }));
  };
  return {
    barista: normalizeRole('barista'),
    cook: normalizeRole('cook')
  };
}
function renderShiftGroups(role, sectionName, groups) {

    <button class="s-add-btn" onclick="addRow('${role === 'barista' ? 'b' : 'c'}-${group.id}')">+ Добавить позицию</button>
  `).join('');
}

function switchShiftProductsTab(role, btn) {
  currentShiftProductsRole = role;
  document.querySelectorAll('.product-manager-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderShiftProductsManager();
}
function renderShiftProductsManager() {
  const products = getShiftProducts();
  const groups = products[currentShiftProductsRole] || [];
  const html = groups.length
    ? groups.map((group, groupIndex) => `
        <div class="product-group-card">
          <div class="product-group-header">
            <input class="product-group-name" type="text" value="${esc(group.name || '')}" oninput="updateShiftGroupName('${currentShiftProductsRole}', ${groupIndex}, this.value)">
            <button class="product-group-delete" onclick="removeShiftGroup('${currentShiftProductsRole}', ${groupIndex})">Удалить группу</button>
          </div>
          ${group.items.map((item, itemIndex) => `
            <div class="product-item-row">
              <input class="product-item-name" type="text" value="${esc(item.name || '')}" oninput="updateShiftProductItem('${currentShiftProductsRole}', ${groupIndex}, ${itemIndex}, this.value, null)">
              <select class="product-item-unit" onchange="updateShiftProductItem('${currentShiftProductsRole}', ${groupIndex}, ${itemIndex}, null, this.value)">
                ${['шт','кг','г','л','мл','пач','порция'].map(unit => `<option value="${unit}" ${item.unit === unit ? 'selected' : ''}>${unit}</option>`).join('')}
              </select>
              <button class="product-item-delete" onclick="removeShiftProductItem('${currentShiftProductsRole}', ${groupIndex}, ${itemIndex})">Удалить</button>
            </div>
          `).join('')}
          <button class="s-add-btn" onclick="addShiftProductItem('${currentShiftProductsRole}', ${groupIndex})">+ Добавить позицию</button>
        </div>
      `).join('')
    : '<div class="empty-state compact">Пока нет групп</div>';
  document.getElementById('shiftProductsManagerContent').innerHTML = `
    <div class="product-manager-root">${html}</div>
    <div class="product-manager-actions">
      <button class="s-add-btn" onclick="addShiftGroup('${currentShiftProductsRole}')">+ Добавить группу</button>
    </div>`;
}
function updateShiftGroupName(role, groupIndex, value) {
  const products = getShiftProducts();
  if (products[role] && products[role][groupIndex]) products[role][groupIndex].name = value;
  setShiftProducts(products);
}
function updateShiftProductItem(role, groupIndex, itemIndex, name, unit) {
  const products = getShiftProducts();
  const group = products[role] && products[role][groupIndex];
  const item = group && group.items && group.items[itemIndex];
  if (!item) return;
  if (name !== null && typeof name !== 'undefined') item.name = name;
  if (unit !== null && typeof unit !== 'undefined') item.unit = unit;
  setShiftProducts(products);
}
function addShiftProductItem(role, groupIndex) {
  const products = getShiftProducts();
  if (!products[role] || !products[role][groupIndex]) return;
  products[role][groupIndex].items.push({ id: `${role}_${groupIndex + 1}_${Date.now()}`, name: 'Новая позиция', unit: 'шт' });
  setShiftProducts(products);
  renderShiftProductsManager();
}
function removeShiftProductItem(role, groupIndex, itemIndex) {
  const products = getShiftProducts();
  if (!products[role] || !products[role][groupIndex]) return;
  products[role][groupIndex].items.splice(itemIndex, 1);
  setShiftProducts(products);
  renderShiftProductsManager();
}
function addShiftGroup(role) {
  const products = getShiftProducts();
  products[role].push({ id: `${role}_group_${Date.now()}`, name: 'Новая группа', section: 'stock', items: [] });
  setShiftProducts(products);
  renderShiftProductsManager();
}
function removeShiftGroup(role, groupIndex) {
  const products = getShiftProducts();
  if (!products[role] || !products[role][groupIndex]) return;
  products[role].splice(groupIndex, 1);
  setShiftProducts(products);
  renderShiftProductsManager();
}
function saveShiftProducts() {
  setShiftProducts(getShiftProducts());
  closeModal('shiftProductsModal');
  renderShift();
  showToast('Продукты обновлены');
}

function toggleEdit(btn) {
  const row = btn.closest('.item-row');
  const sp = row.querySelector('.sitem-name');
  const inp = row.querySelector('.item-name-input');
  if (inp) {
    sp.textContent = inp.value.trim() || 'Позиция';
    sp.style.display = '';
    inp.remove();
    btn.textContent = '✏️';
  } else {
    const i = document.createElement('input');
    i.className = 'item-name-input'; i.type = 'text';
    i.value = sp.textContent.trim(); i.placeholder = 'Название...';
    sp.style.display = 'none';
    row.insertBefore(i, btn);
    i.focus(); i.select();
    i.addEventListener('keydown', e => { if (e.key === 'Enter') toggleEdit(btn); });
    btn.textContent = '✔️';
  }
}

function delRow(btn) { btn.closest('.item-row').remove(); }

function addRow(lid) {
  const list = document.getElementById(lid);
  const row = document.createElement('div');
  row.className = 'item-row';
  row.innerHTML = '<span class="sitem-name">Новая позиция</span><button class="edit-btn" onclick="toggleEdit(this)">✏️</button><input class="num-inp" type="number" placeholder="0" min="0"><select class="unit-sel"><option>шт</option><option>кг</option><option>г</option><option>л</option><option>мл</option><option>пач</option></select><button class="del-btn" onclick="delRow(this)">×</button>';
  list.appendChild(row);
  toggleEdit(row.querySelector('.edit-btn'));
}

function addWO(lid, placeholder) {
  const list = document.getElementById(lid);
  const i = document.createElement('input');
  i.className = 'writeoff-inp'; i.type = 'text';
  i.placeholder = placeholder || 'Что списали и сколько...';
  list.appendChild(i); i.focus();
}

function getRows(lid) {
  const rows = [];
  document.querySelectorAll('#' + lid + ' .item-row').forEach(r => {
    const ne = r.querySelector('.item-name-input') || r.querySelector('.sitem-name');
    const name = (ne ? ne.value || ne.textContent : '—').trim();
    const num = r.querySelector('.num-inp') ? r.querySelector('.num-inp').value || '0' : '0';
    const unit = r.querySelector('.unit-sel') ? r.querySelector('.unit-sel').value : '';
    rows.push({ name, num, unit });
  });
  return rows;
}

function fmtDate(val) {
  if (!val) return '—';
  const p = val.split('-');
  return p[2] + '.' + p[1] + '.' + p[0];
}

// ── AUTH ──
function openLoginModal() {
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginModal').classList.add('active');
  setTimeout(() => document.getElementById('loginPassword').focus(), 100);
}
function doLogin() {
  const pass = document.getElementById('loginPassword').value;
  if (pass === getPassword()) {
    isEditor = true; closeModal('loginModal'); updateHeader();
    if (currentSection) renderSection(); else renderHome();
    showToast('Вы вошли как редактор');
  } else { showToast('Неверный пароль', true); }
}
function doLogout() {
  isEditor = false; updateHeader();
  if (currentSection) renderSection(); else renderHome();
  showToast('Вы вышли');
}
function updateHeader() {
  document.getElementById('headerRight').innerHTML = '';
}

// ── SETTINGS ──
function openSettingsModal() {
  document.getElementById('githubToken').value = getSetting(TOKEN_KEY);
  document.getElementById('githubRepo').value = getSetting(REPO_KEY, 'qamarjora/gooddog-hq');
  document.getElementById('editorPassword').value = '';
  document.getElementById('settingsModal').classList.add('active');
}
function saveSettings() {
  const token = document.getElementById('githubToken').value.trim();
  const repo  = document.getElementById('githubRepo').value.trim();
  const pass  = document.getElementById('editorPassword').value;
  if (token) localStorage.setItem(TOKEN_KEY, token);
  if (repo)  localStorage.setItem(REPO_KEY, repo);
  if (pass)  localStorage.setItem(PASS_KEY, pass);
  closeModal('settingsModal'); showToast('Настройки сохранены');
}

// ── CARD CRUD ──
function openCardModal(cardId = null) {
  editingCardId = cardId;
  document.getElementById('cardModalTitle').textContent = cardId ? 'Редактировать' : 'Новая карточка';
  if (cardId) {
    const data = getData();
    const sec = data.sections.find(s => s.id === currentSection.id);
    const card = sec.cards.find(c => c.id === cardId);
    document.getElementById('cardName').value = card.name;
    document.getElementById('cardContent').value = card.content;
  } else {
    document.getElementById('cardName').value = '';
    document.getElementById('cardContent').value = '';
  }
  document.getElementById('cardModal').classList.add('active');
  setTimeout(() => document.getElementById('cardName').focus(), 100);
}
function saveCard() {
  const name = document.getElementById('cardName').value.trim();
  const content = document.getElementById('cardContent').value.trim();
  if (!name) { showToast('Введи название', true); return; }
  const data = getData();
  const sec = data.sections.find(s => s.id === currentSection.id);
  if (editingCardId) {
    const card = sec.cards.find(c => c.id === editingCardId);
    card.name = name; card.content = content; card.updatedAt = new Date().toISOString();
  } else {
    sec.cards.push({ id: 'card_' + Date.now(), name, content, createdAt: new Date().toISOString() });
  }
  setData(data); currentSection = sec;
  closeModal('cardModal'); renderSection();
  showToast(editingCardId ? 'Карточка обновлена' : 'Карточка добавлена');
}
function askDelete(cardId) { pendingDeleteId = cardId; document.getElementById('confirmModal').classList.add('active'); }
function confirmDelete() {
  const data = getData();
  const sec = data.sections.find(s => s.id === currentSection.id);
  sec.cards = sec.cards.filter(c => c.id !== pendingDeleteId);
  setData(data); currentSection = sec;
  closeModal('confirmModal');
  if (currentCard && currentCard.id === pendingDeleteId) currentCard = null;
  renderSection(); showToast('Карточка удалена');
}

// ── GITHUB SAVE ──
async function saveToGithub() {
  const token = getSetting(TOKEN_KEY);
  const repo  = getSetting(REPO_KEY, 'qamarjora/gooddog-hq');
  if (!token) { showToast('Укажи GitHub токен в настройках ⚙️', true); if (isEditor) openSettingsModal(); return; }
  const btn = document.getElementById('btnGithubSave');
  btn.disabled = true; btn.textContent = '⏳ Сохранение...';
  try {
    const data = getData();
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    let sha = null;
    const getRes = await fetch(`https://api.github.com/repos/${repo}/contents/data.json`, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (getRes.ok) { const j = await getRes.json(); sha = j.sha; }
    const putRes = await fetch(`https://api.github.com/repos/${repo}/contents/data.json`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify({ message: `Update ${new Date().toLocaleDateString('ru-RU')}`, content, ...(sha ? { sha } : {}) })
    });
    if (putRes.ok) { document.getElementById('saveBar').classList.remove('visible'); showToast('✅ Сохранено в GitHub'); }
    else { const e = await putRes.json(); showToast('Ошибка: ' + (e.message || 'GitHub API'), true); }
  } catch { showToast('Ошибка соединения', true); }
  finally { btn.disabled = false; btn.textContent = '☁️ Сохранить в GitHub'; }
}

// ── HELPERS ──
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('active'); });
});

// ── LOAD FROM GITHUB ON START ──
async function loadFromGithub() {
  const repo = getSetting(REPO_KEY, 'qamarjora/gooddog-hq');
  try {
    const res = await fetch(`https://api.github.com/repos/${repo}/contents/data.json`, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    if (res.ok) {
      const json = await res.json();
      const decoded = decodeURIComponent(escape(atob(json.content.replace(/\n/g, ''))));
      const data = JSON.parse(decoded);
      localStorage.setItem(DATA_KEY, JSON.stringify(data));
    }
  } catch { /* тихо — работаем с localStorage */ }
  renderHome();
}

// ── INIT ──
loadFromGithub();
